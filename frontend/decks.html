<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Decks — StudyAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-header {
      max-width: 800px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .page-header h2 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--t1);
      letter-spacing: -0.5px;
    }
    .page-header span {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--t3);
    }
    .decks-grid {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem 5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }
    .deck-card {
      background: var(--surf);
      border: 1px solid var(--bdr);
      border-radius: var(--r);
      padding: 1.3rem;
      cursor: pointer;
      transition: border-color .2s, transform .2s, box-shadow .2s;
      display: flex;
      flex-direction: column;
      gap: .6rem;
    }
    .deck-card:hover {
      border-color: var(--bdr2);
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
    }
    .deck-name {
      font-size: .95rem;
      font-weight: 700;
      color: var(--t1);
      line-height: 1.3;
    }
    .deck-source {
      font-size: .75rem;
      color: var(--t3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .deck-pills {
      display: flex;
      gap: .4rem;
      flex-wrap: wrap;
      margin-top: .2rem;
    }
    .dpill {
      font-family: var(--mono);
      font-size: .62rem;
      padding: .18rem .55rem;
      border-radius: 100px;
      border: 1px solid var(--bdr2);
      color: var(--t2);
    }
    .dpill.due {
      background: var(--gold-a10);
      border-color: var(--gold-a30);
      color: var(--gold);
    }
    .dpill.mastered {
      background: var(--green-a);
      border-color: rgba(52,211,153,.25);
      color: var(--green);
    }
    .deck-footer {
      display: flex;
      gap: .5rem;
      margin-top: .4rem;
    }
    .deck-review-btn {
      flex: 1;
      padding: .42rem .6rem;
      background: var(--gold);
      color: #07080d;
      border: none;
      border-radius: var(--r-xs);
      font-family: var(--sans);
      font-weight: 700;
      font-size: .78rem;
      cursor: pointer;
      transition: all .18s;
    }
    .deck-review-btn:hover { background: var(--gold2); }
    .deck-review-btn:disabled {
      opacity: .4;
      cursor: not-allowed;
      background: var(--surf3);
      color: var(--t3);
    }
    .deck-del-btn {
      padding: .42rem .6rem;
      background: none;
      border: 1px solid var(--bdr);
      border-radius: var(--r-xs);
      color: var(--t3);
      font-size: .75rem;
      cursor: pointer;
      transition: all .18s;
    }
    .deck-del-btn:hover { border-color: var(--red); color: var(--red); }
    .empty-decks {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--t3);
    }
    .empty-decks p { font-size: 1rem; font-weight: 600; color: var(--t2); margin-top: .8rem; }
    .empty-decks span { font-size: .84rem; }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .38rem .85rem;
      background: none;
      border: 1px solid var(--bdr2);
      border-radius: var(--r-xs);
      color: var(--t2);
      font-family: var(--sans);
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all .18s;
    }
    .back-btn:hover { color: var(--t1); border-color: var(--bdr3); }
    .loading-spinner {
      grid-column: 1/-1;
      text-align: center;
      padding: 3rem;
      color: var(--t3);
      font-family: var(--mono);
      font-size: .8rem;
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>
  <div class="noise"></div>

  <!-- HEADER -->
  <header id="header">
    <div class="logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
          <path d="M16 2L28 9V23L16 30L4 23V9L16 2Z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
          <path d="M16 8L23 12V20L16 24L9 20V12L16 8Z" fill="currentColor" opacity="0.2"/>
          <circle cx="16" cy="16" r="3" fill="currentColor"/>
        </svg>
      </div>
      <span class="logo-text">Study<span class="logo-accent">AI</span></span>
    </div>
    <nav class="nav">
      <a href="index.html" class="back-btn">
        ← Back to Study
      </a>
    </nav>
  </header>

  <div class="page-header reveal">
    <div>
      <h2>🃏 My Decks</h2>
      <span id="deck-count-label">Loading…</span>
    </div>
  </div>

  <div class="decks-grid" id="decks-grid">
    <div class="loading-spinner">Loading your decks…</div>
  </div>

  <!-- Canvas animation (same as index) -->
  <script>
    (function initCanvas() {
      const canvas = document.getElementById("bg-canvas");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      let W, H, particles = [];
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      function Particle() {
        this.reset = function () {
          this.x = Math.random() * W; this.y = Math.random() * H;
          this.r = Math.random() * 1.5 + 0.3;
          this.vx = (Math.random() - 0.5) * 0.3; this.vy = (Math.random() - 0.5) * 0.3;
          this.a = Math.random() * 0.4 + 0.1;
          this.c = Math.random() > 0.6 ? [240,192,64] : [79,142,240];
        }; this.reset();
      }
      function init() { particles = Array.from({ length: 60 }, () => new Particle()); }
      function draw() {
        ctx.clearRect(0, 0, W, H);
        const g1 = ctx.createRadialGradient(W*.2, H*.15, 0, W*.2, H*.15, W*.5);
        g1.addColorStop(0, "rgba(79,142,240,0.07)"); g1.addColorStop(1, "transparent");
        ctx.fillStyle = g1; ctx.fillRect(0, 0, W, H);
        particles.forEach(p => {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0 || p.x > W || p.y < 0 || p.y > H) p.reset();
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${p.c[0]},${p.c[1]},${p.c[2]},${p.a})`; ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      resize(); init(); draw();
      window.addEventListener("resize", resize);
    })();

    const API_BASE = localStorage.getItem("sai_backend") || "https://ai-study-tool-4tnw.onrender.com";
    const grid = document.getElementById("decks-grid");
    const countLabel = document.getElementById("deck-count-label");

    async function loadDecks() {
      try {
        const res = await fetch(`${API_BASE}/decks`);
        const decks = await res.json();
        countLabel.textContent = `${decks.length} deck${decks.length !== 1 ? "s" : ""}`;
        if (!decks.length) {
          grid.innerHTML = `
            <div class="empty-decks">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity=".4"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
              <p>No decks yet</p>
              <span>Generate flashcards on the study page and save them as a deck</span>
            </div>`;
          return;
        }
        grid.innerHTML = decks.map(d => `
          <div class="deck-card reveal" data-id="${d.id}">
            <div class="deck-name">${escHtml(d.name)}</div>
            ${d.source ? `<div class="deck-source">📄 ${escHtml(d.source)}</div>` : ""}
            <div class="deck-pills">
              <span class="dpill">${d.total_cards || 0} cards</span>
              ${d.due_cards > 0 ? `<span class="dpill due">${d.due_cards} due</span>` : ""}
              ${d.mastered_cards > 0 ? `<span class="dpill mastered">${d.mastered_cards} mastered</span>` : ""}
            </div>
            <div class="deck-footer">
              <button class="deck-review-btn" onclick="startReview(${d.id}, '${escHtml(d.name)}')"
                ${!d.due_cards ? "disabled title='No cards due for review'" : ""}>
                ${d.due_cards ? `Review (${d.due_cards})` : "All caught up ✓"}
              </button>
              <button class="deck-del-btn" onclick="deleteDeck(event, ${d.id})">🗑</button>
            </div>
          </div>
        `).join("");
      } catch (e) {
        grid.innerHTML = `<div class="empty-decks"><p>Could not load decks</p><span>Check backend URL in Settings on the main page</span></div>`;
      }
    }

    function escHtml(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function startReview(deckId, deckName) {
      localStorage.setItem("sai_review_deck_id", deckId);
      localStorage.setItem("sai_review_deck_name", deckName);
      window.location.href = "review.html";
    }

    async function deleteDeck(e, deckId) {
      e.stopPropagation();
      if (!confirm("Delete this deck and all its cards?")) return;
      try {
        await fetch(`${API_BASE}/decks/${deckId}`, { method: "DELETE" });
        loadDecks();
      } catch {
        alert("Delete failed — check connection.");
      }
    }

    loadDecks();
  </script>
</body>
</html>
